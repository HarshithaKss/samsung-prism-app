# =============================================================
# docker-compose.yml — Samsung PRISM Document Classifier
# =============================================================
# Orchestrates the full application stack:
#   • backend  — Flask ML inference server (TFLite + PyTorch)
#   • frontend — Expo web app served by nginx (reverse proxy)
#
# Usage:
#   docker compose build          # Build both images
#   docker compose up -d          # Start in detached mode
#   docker compose logs -f        # Stream logs
#   docker compose down           # Stop and remove containers
# =============================================================

services:
  # ── ML Backend (Flask + TensorFlow Lite + PyTorch) ─────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: prism-backend
    ports:
      - "5000:5000"
    environment:
      - PYTHONUNBUFFERED=1
      - TF_CPP_MIN_LOG_LEVEL=2
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

  # ── Web Frontend (nginx + Expo static build) ───────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: prism-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost/"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3

# ── Shared Network ───────────────────────────────────────────
networks:
  default:
    name: prism-network
    driver: bridge
