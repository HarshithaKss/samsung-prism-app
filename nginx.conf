# =============================================================
# nginx.conf — Samsung PRISM Frontend Reverse Proxy
# Serves static Expo web build & proxies API to Flask backend
# =============================================================

server {
    listen       80;
    server_name  _;

    # Allow large base64 image uploads (document images can be big)
    client_max_body_size 25M;

    # ── Serve static frontend files ──────────────────────────
    root   /usr/share/nginx/html;
    index  index.html;

    # SPA fallback — all non-file routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Reverse proxy: classification endpoint → backend ─────
    location /classify {
        proxy_pass         http://backend:5000/classify;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ── Reverse proxy: health check endpoint → backend ───────
    location /health {
        proxy_pass         http://backend:5000/health;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
    }

    # ── Gzip compression for faster static asset delivery ────
    gzip             on;
    gzip_types       text/plain text/css application/json application/javascript text/xml;
    gzip_min_length  256;

    # ── Security headers ─────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff"    always;
}
